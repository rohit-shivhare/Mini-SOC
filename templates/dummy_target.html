<!DOCTYPE html>
<html>
<head>
    <title>Test Target</title>
</head>
<body>
    <h1>Dummy Target for Vulnerability Scanner</h1>
    <p>This page contains a deliberately vulnerable form to test the SOC scanner.</p>
    
    <h3>Login Form (Tests SQLi)</h3>
    <form action="/dummy" method="POST">
        <label>Username:</label>
        <input type="text" name="username"><br><br>
        <label>Password:</label>
        <input type="password" name="password"><br><br>
        <input type="submit" value="Login">
    </form>

    <br><hr><br>

    <h3>Search Form (Tests XSS)</h3>
    <form action="/dummy" method="POST">
        <label>Search Query:</label>
        <input type="text" name="search"><br><br>
        <input type="submit" value="Search">
    </form>

    {% if message %}
        <div style="margin-top: 20px; padding: 10px; border: 1px solid red;">
            {{ message | safe }}
        </div>
    {% endif %}
</body>
</html>
